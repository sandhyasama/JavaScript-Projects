<!DOCTYPE html>
<html>

<head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.0/jquery.min.js"></script>
</head>

<script>
    $(document).ready(function () {
        $("html").append(
            "<body>\
                <div id='container'>\
                  <div id='inner'>\
                    <h1>Basic jQuery</h1>\
                    <p id='1'>Parapgraph 1</p>\
                    <p id='2'>Parapgraph 2</p>\
                    <p id='3'>Parapgraph 3</p>\
                   </div>\
                 </div>\
            </body>"
        );

        //change color to red on element with id2
        $("#2").css({"color": "red"});

        //handle click on id 3 element
        $("#3").click(function (){
            $("h1").hide();
        });

        //using on method to handle click event
        //showing hiddent h1 element with it
       $("#1").on("click", function(){
        alert("You have clicked on Pargraph1 element!");
        //show back h1 element
         $("h1").show();
       });
    });

</script>

</html>
