<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="JS/main.js"></script>
    <link rel="stylesheet" type="text/css" href="css/style.css">
</head>

<body>
    <p>How many seconds would you like to set the alarm for?</p>
    <input id="seconds" value="" />
    <button onclick="countdown()">Click here</button>
    <p id="timer"></p>

    <!--Slide show start -->
    <div class="slideshow-container">

        <!--first image -->
        <div class="mySlides fade">
            <div class="numbertext">1 / 3</div>
            <img src="images/car1.jpg" style="width:100%">
            <div class="text">Image 1</div>
        </div>

           <!--second image -->
        <div class="mySlides fade">
            <div class="numbertext">2 / 3</div>
            <img src="images/car2.jpg" style="width:100%">
            <div class="text">Image 2</div>
        </div>

           <!--third image -->
        <div class="mySlides fade">
            <div class="numbertext">3 / 3</div>
            <img src="images/car3.jpg" style="width:100%">
            <div class="text">Image 3</div>
        </div>

        <!-- previous and next buttons-->
        <a class="prev" onclick="plusSlides(-1)">❮</a>
        <a class="next" onclick="plusSlides(1)">❯</a>

    </div>
    <br>

    <div style="text-align:center">
        <!--instead of clicking only, add mouse over so that slide show runs on mouse over also -->
        <span class="dot" onclick="currentSlide(1)" onmouseover="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)" onmouseover="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)" onmouseover="currentSlide(3)"></span>
    </div>
    <!--Slide show end-->
</body>

</html>
